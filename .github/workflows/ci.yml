name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: hyunwoo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hyunwoo_test

      - name: Lint
        run: pnpm lint:ci

      - name: Type Check
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test:cov
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hyunwoo_test
          JWT_SECRET: ci-test-secret-32-chars-minimum!!
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD_HASH: $2a$12$LQv3c1yqBWVHxkd0LHAkCOYz6TtxMQJqhN8/LewdBPj/zo.RvCNPC
          R2_ACCOUNT_ID: placeholder
          R2_ACCESS_KEY_ID: placeholder
          R2_SECRET_ACCESS_KEY: placeholder
          R2_BUCKET_NAME: placeholder
          R2_PUBLIC_URL: https://placeholder.r2.dev
          ALLOWED_ORIGINS: http://localhost:3000
