name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Connect via Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Mac mini
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MACMINI_HOST }}
          username: ${{ secrets.MACMINI_USER }}
          key: ${{ secrets.MACMINI_SSH_KEY }}
          command_timeout: 10m
          script: |
            export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
            cd ~/api-server

            git pull origin main

            docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml build api
            docker compose --env-file .env.prod -f docker-compose.yml -f docker-compose.prod.yml up -d
            docker image prune -f

            sleep 30
            curl -sf http://localhost:4000/health || exit 1
