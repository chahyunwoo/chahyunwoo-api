# Local development — docker compose -f docker-compose.yml -f docker-compose.local.yml up
services:
  api:
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: development

  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hyunwoo}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data

volumes:
  postgres_local_data:
